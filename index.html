<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Magic 空專抽獎</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --pink-color: #ff85a2;
            --grey-color: #8e8e8e;
            --bg-color: #fff5f7;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 10px;
            color: #333;
            margin: 0;
        }

        h1 {
            color: var(--pink-color);
            font-size: 2rem;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 800;
            white-space: nowrap;
        }

        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 850px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            flex: 1;
            min-width: 320px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 2px solid transparent;
        }

        .pink-card { border-color: var(--pink-color); }
        .grey-card { border-color: var(--grey-color); }

        h2 { margin-top: 0; font-size: 1.1rem; margin-bottom: 10px; }
        .pink-title { color: var(--pink-color); }
        .grey-title { color: var(--grey-color); }

        .hint { font-size: 0.8rem; color: #999; margin-bottom: 8px; }

        textarea {
            width: 100%;
            height: 120px; /* 縮短了高度，因為現在可以用隔開的方式 */
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 12px;
            resize: vertical;
            box-sizing: border-box;
            font-size: 14px;
            background: #fafafa;
            line-height: 1.6;
        }

        .count-text {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
            font-weight: bold;
        }

        .btn-container { margin: 40px 0; }

        button {
            padding: 16px 60px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, var(--grey-color), var(--pink-color));
            border: none;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.3);
            transition: 0.3s;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255, 133, 162, 0.5); }

        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            backdrop-filter: blur(8px);
        }

        .winner-box { text-align: center; animation: popIn 0.6s ease-out; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .winner-name {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 10px 0;
            display: block;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .winner-pink { color: var(--pink-color); }
        .winner-grey { color: var(--grey-color); }

        .close-btn {
            margin-top: 40px;
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 12px 40px;
            border-radius: 30px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <h1>Pink Magic 空專抽獎</h1>

    <div class="container">
        <div class="card grey-card">
            <h2 class="grey-title">🔘 灰版 (Grey Ver.)</h2>
            <p class="hint">可用 頓號、逗號 , 或 空格 隔開名單</p>
            <textarea id="greyInput" placeholder="例如：小明、小華、003、A05..."></textarea>
            <p class="count-text">已輸入：<span id="greyCount" style="color:var(--grey-color)">0</span> 人</p>
        </div>

        <div class="card pink-card">
            <h2 class="pink-title">🌸 粉版 (Pink Ver.)</h2>
            <p class="hint">可用 頓號、逗號 , 或 空格 隔開名單</p>
            <textarea id="pinkInput" placeholder="例如：小美，小雅，002，B01..."></textarea>
            <p class="count-text">已輸入：<span id="pinkCount" style="color:var(--pink-color)">0</span> 人</p>
        </div>
    </div>

    <div class="btn-container">
        <button onclick="drawWinners()">✨ 開始抽獎 ✨</button>
    </div>

    <div id="overlay">
        <div class="winner-box" id="rolling">
            <h2 style="letter-spacing: 5px; color: #ff85a2;">MAGIC ROLLING...</h2>
        </div>
        <div class="winner-box" id="result" style="display:none;">
            <h2 style="font-size: 1.2rem; color: #aaa; letter-spacing: 2px;">WINNERS</h2>
            <div style="margin-bottom: 30px;">
                <span class="grey-title" style="font-size: 1rem;">灰版得獎者</span>
                <span id="winnerGrey" class="winner-name winner-grey"></span>
            </div>
            <div>
                <span class="pink-title" style="font-size: 1rem;">粉版得獎者</span>
                <span id="winnerPink" class="winner-name winner-pink"></span>
            </div>
            <div class="close-btn" onclick="closeOverlay()">點擊返回</div>
        </div>
    </div>

    <script>
        // 改良過的解析函數：支援換行、半形/全形逗號、頓號、空格
        function parseList(text) {
            // 使用正則表達式分割：換行 \n, 半形逗號 ,, 全形逗號 ，, 頓號 、, 各種空格 \s
            return text.split(/[\n,，、\s]+/).filter(item => item.trim() !== '');
        }

        const updateCount = (id, countId) => {
            const list = parseList(document.getElementById(id).value);
            document.getElementById(countId).innerText = list.length;
        };

        document.getElementById('greyInput').addEventListener('input', () => updateCount('greyInput', 'greyCount'));
        document.getElementById('pinkInput').addEventListener('input', () => updateCount('pinkInput', 'pinkCount'));

        function drawWinners() {
            const greyList = parseList(document.getElementById('greyInput').value);
            const pinkList = parseList(document.getElementById('pinkInput').value);

            if (greyList.length === 0 || pinkList.length === 0) {
                alert("兩邊的名單都不能空著喔！");
                return;
            }

            const overlay = document.getElementById('overlay');
            const rolling = document.getElementById('rolling');
            const result = document.getElementById('result');
            
            overlay.style.display = 'flex';
            rolling.style.display = 'block';
            result.style.display = 'none';

            const winnerGrey = greyList[Math.floor(Math.random() * greyList.length)];
            const winnerPink = pinkList[Math.floor(Math.random() * pinkList.length)];

            setTimeout(() => {
                document.getElementById('winnerGrey').innerText = winnerGrey;
                document.getElementById('winnerPink').innerText = winnerPink;
                rolling.style.display = 'none';
                result.style.display = 'block';
                launchConfetti();
            }, 1200);
        }

        function launchConfetti() {
            const end = Date.now() + 3000;
            const colors = ['#ff85a2', '#8e8e8e', '#ffffff'];
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0, y: 0.6 }, colors: colors });
                confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1, y: 0.6 }, colors: colors });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function closeOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
